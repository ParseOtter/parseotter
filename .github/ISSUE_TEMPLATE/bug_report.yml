name: Bug report
description: Report a reproducible ParseOtter bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private account IDs, private documents, or user data. For security issues, follow SECURITY.md instead of opening a public issue.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Frontend
        - API Worker
        - Modal converter
        - Deployment docs
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or safe-to-share inputs.
      placeholder: |
        1. Deploy with ...
        2. Upload ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        Node:
        Yarn:
        Python:
        Cloudflare Wrangler:
        Modal CLI:
        Browser:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets, tokens, account IDs, and document content.
      render: shell
    validations:
      required: false
