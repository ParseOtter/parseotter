name: Deploy API Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy api production to confirm the production API deployment"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-api-deploy
  cancel-in-progress: false

jobs:
  api:
    name: API Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://api.parseotter.com/health
    defaults:
      run:
        working-directory: api-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          set -euo pipefail

          if [ "${{ inputs.confirm }}" != "deploy api production" ]; then
            echo "Confirmation must be exactly: deploy api production" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api-worker/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate production configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PARSEOTTER_API_DOMAIN: ${{ vars.PARSEOTTER_API_DOMAIN }}
          PARSEOTTER_API_WORKER_NAME: ${{ vars.PARSEOTTER_API_WORKER_NAME }}
          PARSEOTTER_D1_DATABASE_ID: ${{ vars.PARSEOTTER_D1_DATABASE_ID }}
          PARSEOTTER_D1_DATABASE_NAME: ${{ vars.PARSEOTTER_D1_DATABASE_NAME }}
          PARSEOTTER_GA4_MEASUREMENT_ID: ${{ vars.PARSEOTTER_GA4_MEASUREMENT_ID }}
          PARSEOTTER_MODAL_DISPATCH_URL: ${{ vars.PARSEOTTER_MODAL_DISPATCH_URL }}
          PARSEOTTER_R2_BUCKET_NAME: ${{ vars.PARSEOTTER_R2_BUCKET_NAME }}
          PARSEOTTER_R2_S3_ENDPOINT: ${{ vars.PARSEOTTER_R2_S3_ENDPOINT }}
          PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID: ${{ vars.PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID }}
          PARSEOTTER_RATELIMIT_CREATE_TASK_ID: ${{ vars.PARSEOTTER_RATELIMIT_CREATE_TASK_ID }}
          PARSEOTTER_RATELIMIT_DOWNLOAD_ID: ${{ vars.PARSEOTTER_RATELIMIT_DOWNLOAD_ID }}
          PARSEOTTER_RATELIMIT_FEEDBACK_ID: ${{ vars.PARSEOTTER_RATELIMIT_FEEDBACK_ID }}
          PARSEOTTER_RATELIMIT_SIGN_PARTS_ID: ${{ vars.PARSEOTTER_RATELIMIT_SIGN_PARTS_ID }}
          PARSEOTTER_RATELIMIT_STATUS_POLL_ID: ${{ vars.PARSEOTTER_RATELIMIT_STATUS_POLL_ID }}
          PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID: ${{ vars.PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID }}
          PARSEOTTER_SITE_ORIGIN: ${{ vars.PARSEOTTER_SITE_ORIGIN }}
          PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES: ${{ vars.PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES }}
        run: |
          set -euo pipefail

          node --input-type=module <<'EOF'
          import { createHash } from 'node:crypto'

          const required = [
            'CLOUDFLARE_ACCOUNT_ID',
            'CLOUDFLARE_API_TOKEN',
            'PARSEOTTER_API_DOMAIN',
            'PARSEOTTER_API_WORKER_NAME',
            'PARSEOTTER_D1_DATABASE_ID',
            'PARSEOTTER_D1_DATABASE_NAME',
            'PARSEOTTER_GA4_MEASUREMENT_ID',
            'PARSEOTTER_MODAL_DISPATCH_URL',
            'PARSEOTTER_R2_BUCKET_NAME',
            'PARSEOTTER_R2_S3_ENDPOINT',
            'PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID',
            'PARSEOTTER_RATELIMIT_CREATE_TASK_ID',
            'PARSEOTTER_RATELIMIT_DOWNLOAD_ID',
            'PARSEOTTER_RATELIMIT_FEEDBACK_ID',
            'PARSEOTTER_RATELIMIT_SIGN_PARTS_ID',
            'PARSEOTTER_RATELIMIT_STATUS_POLL_ID',
            'PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID',
            'PARSEOTTER_SITE_ORIGIN',
            'PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES',
          ]

          const missing = required.filter((name) => !process.env[name])
          if (missing.length > 0) {
            console.error(`Missing required configuration: ${missing.join(', ')}`)
            process.exit(1)
          }

          const expectedPublicValues = {
            PARSEOTTER_API_DOMAIN: 'api.parseotter.com',
            PARSEOTTER_SITE_ORIGIN: 'https://www.parseotter.com',
            PARSEOTTER_GA4_MEASUREMENT_ID: 'G-NPC6FYTW8T',
            PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES: 'www.parseotter.com',
          }

          for (const [name, expected] of Object.entries(expectedPublicValues)) {
            if (process.env[name] !== expected) {
              console.error(`${name} must be ${expected} for production.`)
              process.exit(1)
            }
          }

          const modalDispatchUrl = new URL(process.env.PARSEOTTER_MODAL_DISPATCH_URL)
          if (modalDispatchUrl.protocol !== 'https:' || modalDispatchUrl.pathname !== '/api/internal/cloudflare/jobs/dispatch') {
            console.error('PARSEOTTER_MODAL_DISPATCH_URL must be an HTTPS Modal dispatch endpoint ending in /api/internal/cloudflare/jobs/dispatch.')
            process.exit(1)
          }

          const r2Endpoint = new URL(process.env.PARSEOTTER_R2_S3_ENDPOINT)
          if (r2Endpoint.protocol !== 'https:' || !r2Endpoint.hostname.endsWith('.r2.cloudflarestorage.com')) {
            console.error('PARSEOTTER_R2_S3_ENDPOINT must be a Cloudflare R2 HTTPS endpoint.')
            process.exit(1)
          }

          const sensitiveResourceValues = [
            process.env.CLOUDFLARE_ACCOUNT_ID,
            process.env.PARSEOTTER_API_WORKER_NAME,
            process.env.PARSEOTTER_D1_DATABASE_NAME,
            process.env.PARSEOTTER_D1_DATABASE_ID,
            process.env.PARSEOTTER_R2_BUCKET_NAME,
            process.env.PARSEOTTER_R2_S3_ENDPOINT,
            process.env.PARSEOTTER_MODAL_DISPATCH_URL,
            process.env.PARSEOTTER_RATELIMIT_CREATE_TASK_ID,
            process.env.PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID,
            process.env.PARSEOTTER_RATELIMIT_SIGN_PARTS_ID,
            process.env.PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID,
            process.env.PARSEOTTER_RATELIMIT_STATUS_POLL_ID,
            process.env.PARSEOTTER_RATELIMIT_DOWNLOAD_ID,
            process.env.PARSEOTTER_RATELIMIT_FEEDBACK_ID,
          ]
          const fingerprint = createHash('sha256').update(sensitiveResourceValues.join('\n')).digest('hex')
          const expectedFingerprint = 'ae3e396673cabc72bd009c6236a83a30f607122484a27425a8a0462789821645'

          if (fingerprint !== expectedFingerprint) {
            console.error('Production resource fingerprint does not match the currently approved API deployment target.')
            process.exit(1)
          }
          EOF

      - name: Generate Worker types
        run: yarn cf-typegen

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Generate temporary Wrangler config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          PARSEOTTER_API_DOMAIN: ${{ vars.PARSEOTTER_API_DOMAIN }}
          PARSEOTTER_API_WORKER_NAME: ${{ vars.PARSEOTTER_API_WORKER_NAME }}
          PARSEOTTER_D1_DATABASE_ID: ${{ vars.PARSEOTTER_D1_DATABASE_ID }}
          PARSEOTTER_D1_DATABASE_NAME: ${{ vars.PARSEOTTER_D1_DATABASE_NAME }}
          PARSEOTTER_GA4_MEASUREMENT_ID: ${{ vars.PARSEOTTER_GA4_MEASUREMENT_ID }}
          PARSEOTTER_MODAL_DISPATCH_URL: ${{ vars.PARSEOTTER_MODAL_DISPATCH_URL }}
          PARSEOTTER_R2_BUCKET_NAME: ${{ vars.PARSEOTTER_R2_BUCKET_NAME }}
          PARSEOTTER_R2_S3_ENDPOINT: ${{ vars.PARSEOTTER_R2_S3_ENDPOINT }}
          PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID: ${{ vars.PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID }}
          PARSEOTTER_RATELIMIT_CREATE_TASK_ID: ${{ vars.PARSEOTTER_RATELIMIT_CREATE_TASK_ID }}
          PARSEOTTER_RATELIMIT_DOWNLOAD_ID: ${{ vars.PARSEOTTER_RATELIMIT_DOWNLOAD_ID }}
          PARSEOTTER_RATELIMIT_FEEDBACK_ID: ${{ vars.PARSEOTTER_RATELIMIT_FEEDBACK_ID }}
          PARSEOTTER_RATELIMIT_SIGN_PARTS_ID: ${{ vars.PARSEOTTER_RATELIMIT_SIGN_PARTS_ID }}
          PARSEOTTER_RATELIMIT_STATUS_POLL_ID: ${{ vars.PARSEOTTER_RATELIMIT_STATUS_POLL_ID }}
          PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID: ${{ vars.PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID }}
          PARSEOTTER_SITE_ORIGIN: ${{ vars.PARSEOTTER_SITE_ORIGIN }}
          PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES: ${{ vars.PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES }}
        run: |
          set -euo pipefail

          node --input-type=module <<'EOF'
          import { writeFileSync } from 'node:fs'
          import { resolve } from 'node:path'

          const config = {
            $schema: resolve('node_modules/wrangler/config-schema.json'),
            name: process.env.PARSEOTTER_API_WORKER_NAME,
            account_id: process.env.CLOUDFLARE_ACCOUNT_ID,
            main: 'src/index.ts',
            compatibility_date: '2026-04-25',
            compatibility_flags: ['nodejs_compat'],
            workers_dev: false,
            preview_urls: false,
            routes: [
              {
                pattern: process.env.PARSEOTTER_API_DOMAIN,
                custom_domain: true,
              },
            ],
            vars: {
              APP_ENV: 'production',
              ABUSE_LIMITING_ENABLED: 'true',
              CORS_ORIGINS: process.env.PARSEOTTER_SITE_ORIGIN,
              R2_ACCOUNT_ID: process.env.CLOUDFLARE_ACCOUNT_ID,
              R2_BUCKET_NAME: process.env.PARSEOTTER_R2_BUCKET_NAME,
              R2_S3_ENDPOINT: process.env.PARSEOTTER_R2_S3_ENDPOINT,
              R2_PRESIGNED_URL_TTL_SECONDS: '900',
              DOWNLOAD_URL_TTL_SECONDS: '600',
              TASK_RETENTION_HOURS: '48',
              PROCESSING_TIMEOUT_SECONDS: '1800',
              GA4_ENABLED: 'true',
              GA4_MEASUREMENT_ID: process.env.PARSEOTTER_GA4_MEASUREMENT_ID,
              BACKEND_PUBLIC_ORIGIN: `https://${process.env.PARSEOTTER_API_DOMAIN}`,
              MODAL_DISPATCH_URL: process.env.PARSEOTTER_MODAL_DISPATCH_URL,
              MODAL_CALLBACK_TOLERANCE_SECONDS: '300',
              CONVERT_PUBLIC_ENABLED: 'true',
              DISPATCH_ENABLED: 'true',
              TURNSTILE_ENABLED: 'true',
              TURNSTILE_EXPECTED_HOSTNAMES: process.env.PARSEOTTER_TURNSTILE_EXPECTED_HOSTNAMES,
              MAX_UPLOAD_FILE_SIZE_MB: '100',
              CLIENT_DAILY_DISPATCH_LIMIT: '3',
              CLIENT_DAILY_UPLOAD_BYTES_LIMIT: '314572800',
              CLIENT_ACTIVE_TASK_LIMIT: '2',
              CLIENT_CREATE_TASKS_PER_HOUR: '10',
              CLIENT_UPLOAD_SESSIONS_PER_HOUR: '10',
              CLIENT_COMPLETE_UPLOADS_PER_HOUR: '3',
              CLIENT_DOWNLOAD_URLS_PER_HOUR: '30',
              GLOBAL_ACTIVE_DISPATCH_LIMIT: '5',
              GLOBAL_PENDING_DISPATCH_LIMIT: '20',
              GLOBAL_DAILY_DISPATCH_LIMIT: '100',
              MAX_ESTIMATED_WAIT_SECONDS: '900',
              ESTIMATED_CONVERSION_SECONDS: '180',
            },
            secrets: {
              required: [
                'R2_ACCESS_KEY_ID',
                'R2_SECRET_ACCESS_KEY',
                'MODAL_DISPATCH_API_KEY',
                'MODAL_CALLBACK_HMAC_SECRET',
                'TURNSTILE_SECRET_KEY',
                'GA4_API_SECRET',
              ],
            },
            observability: {
              enabled: true,
              head_sampling_rate: 1,
            },
            d1_databases: [
              {
                binding: 'DB',
                database_name: process.env.PARSEOTTER_D1_DATABASE_NAME,
                database_id: process.env.PARSEOTTER_D1_DATABASE_ID,
                migrations_dir: 'migrations',
              },
            ],
            r2_buckets: [
              {
                binding: 'R2_BUCKET',
                bucket_name: process.env.PARSEOTTER_R2_BUCKET_NAME,
              },
            ],
            durable_objects: {
              bindings: [
                {
                  name: 'TASK_COORDINATOR',
                  class_name: 'TaskCoordinator',
                },
              ],
            },
            migrations: [
              {
                tag: 'v1',
                new_sqlite_classes: ['TaskCoordinator'],
              },
            ],
            ratelimits: [
              {
                name: 'CREATE_TASK_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_CREATE_TASK_ID,
                simple: { limit: 10, period: 60 },
              },
              {
                name: 'UPLOAD_SESSION_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_UPLOAD_SESSION_ID,
                simple: { limit: 10, period: 60 },
              },
              {
                name: 'SIGN_PARTS_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_SIGN_PARTS_ID,
                simple: { limit: 120, period: 60 },
              },
              {
                name: 'COMPLETE_UPLOAD_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_COMPLETE_UPLOAD_ID,
                simple: { limit: 10, period: 60 },
              },
              {
                name: 'STATUS_POLL_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_STATUS_POLL_ID,
                simple: { limit: 120, period: 60 },
              },
              {
                name: 'DOWNLOAD_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_DOWNLOAD_ID,
                simple: { limit: 30, period: 60 },
              },
              {
                name: 'FEEDBACK_RATE_LIMITER',
                namespace_id: process.env.PARSEOTTER_RATELIMIT_FEEDBACK_ID,
                simple: { limit: 10, period: 60 },
              },
            ],
            triggers: {
              crons: ['*/30 * * * *'],
            },
          }

          writeFileSync('parseotter-api-production-wrangler.generated.jsonc', JSON.stringify(config, null, 2))
          console.log('Generated parseotter-api-production-wrangler.generated.jsonc')
          EOF

      - name: Record current deployments
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./node_modules/.bin/wrangler deployments list --config parseotter-api-production-wrangler.generated.jsonc --json

      - name: Wrangler dry run
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./node_modules/.bin/wrangler deploy --dry-run --config parseotter-api-production-wrangler.generated.jsonc --minify

      - name: Validate production Worker secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          ./node_modules/.bin/wrangler secret list --config parseotter-api-production-wrangler.generated.jsonc --format json > /tmp/parseotter-api-production-secrets.json

          node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs'

          const required = [
            'R2_ACCESS_KEY_ID',
            'R2_SECRET_ACCESS_KEY',
            'MODAL_DISPATCH_API_KEY',
            'MODAL_CALLBACK_HMAC_SECRET',
            'TURNSTILE_SECRET_KEY',
            'GA4_API_SECRET',
          ]
          const payload = JSON.parse(readFileSync('/tmp/parseotter-api-production-secrets.json', 'utf8'))
          const entries = Array.isArray(payload) ? payload : Array.isArray(payload.secrets) ? payload.secrets : []
          const names = new Set(entries.map((entry) => (typeof entry === 'string' ? entry : entry?.name)).filter(Boolean))
          const missing = required.filter((name) => !names.has(name))

          if (missing.length > 0) {
            console.error(`Production Worker is missing required secret names: ${missing.join(', ')}`)
            process.exit(1)
          }

          console.log(`Validated ${required.length} required production Worker secret names.`)
          EOF

      - name: Deploy API
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          deploy_message="Deploy API from $GITHUB_SHA run $GITHUB_RUN_ID attempt $GITHUB_RUN_ATTEMPT"
          set +e
          ./node_modules/.bin/wrangler deploy --config parseotter-api-production-wrangler.generated.jsonc --minify --message "$deploy_message"
          deploy_exit_code=$?
          set -e

          if [ "$deploy_exit_code" -eq 0 ]; then
            exit 0
          fi

          echo "wrangler deploy exited with code $deploy_exit_code. Checking whether Cloudflare created the deployment before failing."
          ./node_modules/.bin/wrangler deployments list --config parseotter-api-production-wrangler.generated.jsonc --json > /tmp/parseotter-api-production-deployments-after-failed-deploy.json

          DEPLOY_MESSAGE="$deploy_message" node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs'

          const deployments = JSON.parse(readFileSync('/tmp/parseotter-api-production-deployments-after-failed-deploy.json', 'utf8'))
          const deployment = deployments.find((item) => item?.annotations?.['workers/message'] === process.env.DEPLOY_MESSAGE)

          if (!deployment) {
            console.error('No Cloudflare deployment was found for this GitHub Actions run after wrangler deploy failed.')
            process.exit(1)
          }

          console.log(`Cloudflare deployment exists despite wrangler non-zero exit: ${deployment.id}`)
          console.log(`Version: ${deployment.versions?.[0]?.version_id ?? 'unknown'}`)
          EOF

      - name: Verify production API health
        run: |
          set -euo pipefail

          node --input-type=module <<'EOF'
          const response = await fetch('https://api.parseotter.com/health', {
            headers: { 'Cache-Control': 'no-cache' },
          })
          const text = await response.text()

          if (!response.ok) {
            console.error(`API health check failed: status=${response.status}, body=${text}`)
            process.exit(1)
          }

          let payload
          try {
            payload = JSON.parse(text)
          } catch {
            console.error(`API health response is not JSON: ${text}`)
            process.exit(1)
          }

          const checks = [
            ['success', payload.success === true],
            ['error', payload.error === null],
            ['data.status', payload.data?.status === 'ok'],
            ['data.service', payload.data?.service === 'parseotter-api'],
            ['data.runtime', payload.data?.runtime === 'cloudflare-worker'],
            ['data.timestamp', typeof payload.data?.timestamp === 'string'],
          ]
          const failed = checks.filter(([, ok]) => !ok).map(([name]) => name)

          if (failed.length > 0) {
            console.error(`API health validation failed: ${failed.join(', ')}`)
            process.exit(1)
          }

          console.log('Verified production API health.')
          EOF

      - name: Record new deployments
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./node_modules/.bin/wrangler deployments list --config parseotter-api-production-wrangler.generated.jsonc --json
