name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.1"
        required: true
        type: string
      latest:
        description: "Mark this release as latest"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag input
        run: |
          set -euo pipefail

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Tag must look like v0.1.1, got: $TAG" >&2
            exit 1
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Resolve release notes
        id: notes
        run: |
          set -euo pipefail

          version="${TAG#v}"
          notes_file="docs/RELEASE_NOTES_v${version}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes file does not exist: $notes_file" >&2
            exit 1
          fi

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Verify remote tag exists
        run: |
          set -euo pipefail

          git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null

      - name: Ensure release does not already exist
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists for tag: $TAG" >&2
            exit 1
          fi

      - name: Publish release
        run: |
          set -euo pipefail

          latest_flag="--latest=false"
          if [ "${{ inputs.latest }}" = "true" ]; then
            latest_flag="--latest"
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "ParseOtter $TAG" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            "$latest_flag"
