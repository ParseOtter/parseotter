name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "New tag to create and publish, for example v0.1.2"
        required: true
        type: string
      confirm:
        description: "Type release <tag> to confirm, for example release v0.1.2"
        required: true
        type: string
      latest:
        description: "Mark this release as latest"
        required: true
        type: boolean
        default: true

permissions:
  actions: read
  contents: write

jobs:
  publish:
    name: Create Tag And Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      CONFIRM: ${{ inputs.confirm }}
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Validate input
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Run this workflow from main, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Tag must look like v0.1.2, got: $TAG" >&2
            exit 1
          fi

          expected_confirm="release $TAG"
          if [ "$CONFIRM" != "$expected_confirm" ]; then
            echo "Confirmation must be exactly: $expected_confirm" >&2
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release files
        id: release
        run: |
          set -euo pipefail

          version="${TAG#v}"
          notes_file="docs/RELEASE_NOTES_v${version}.md"
          target_sha="$(git rev-parse HEAD)"

          if [ ! -f "$notes_file" ]; then
            echo "Release notes file does not exist: $notes_file" >&2
            exit 1
          fi

          if ! grep -Eq "^## ${TAG} - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a dated section header for $TAG." >&2
            exit 1
          fi

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "Release target: $target_sha"

      - name: Ensure tag does not already exist
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Remote tag already exists: $TAG" >&2
            exit 1
          fi

      - name: Ensure release does not already exist
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists for tag: $TAG" >&2
            exit 1
          fi

      - name: Verify required checks passed
        env:
          TARGET_SHA: ${{ steps.release.outputs.target_sha }}
        run: |
          set -euo pipefail

          node --input-type=module <<'EOF'
          const requiredWorkflows = ['CI', 'Security Scan']
          const response = await fetch(
            `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/actions/runs?head_sha=${process.env.TARGET_SHA}&per_page=100`,
            {
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${process.env.GH_TOKEN}`,
                'User-Agent': 'parseotter-release-workflow',
              },
            }
          )

          if (!response.ok) {
            const body = await response.text()
            console.error(`Unable to query workflow runs: HTTP ${response.status} ${body}`)
            process.exit(1)
          }

          const payload = await response.json()
          const runs = Array.isArray(payload.workflow_runs) ? payload.workflow_runs : []

          for (const workflowName of requiredWorkflows) {
            const matchingRuns = runs.filter(
              (run) => run.name === workflowName && run.head_sha === process.env.TARGET_SHA
            )
            const successfulRun = matchingRuns.find(
              (run) => run.status === 'completed' && run.conclusion === 'success'
            )

            if (!successfulRun) {
              const observed = matchingRuns
                .map((run) => `${run.status}/${run.conclusion ?? 'pending'} ${run.html_url}`)
                .join(', ')
              console.error(
                `${workflowName} must be completed successfully for ${process.env.TARGET_SHA}. Observed: ${observed || 'none'}`
              )
              process.exit(1)
            }

            console.log(`${workflowName} passed: ${successfulRun.html_url}`)
          }
          EOF

      - name: Create and push tag
        id: create_tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "ParseOtter $TAG"
          git push origin "refs/tags/${TAG}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Publish release
        run: |
          set -euo pipefail

          latest_flag="--latest=false"
          if [ "${{ inputs.latest }}" = "true" ]; then
            latest_flag="--latest"
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "ParseOtter $TAG" \
            --notes-file "${{ steps.release.outputs.notes_file }}" \
            "$latest_flag"

      - name: Delete tag after failed release publish
        if: failure() && steps.create_tag.outputs.pushed == 'true'
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release exists for $TAG; leaving tag in place."
            exit 0
          fi

          git push --delete origin "$TAG"
          git tag -d "$TAG" || true
