name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Run Gitleaks
        run: "$(go env GOPATH)/bin/gitleaks" dir . --no-banner --redact=100
