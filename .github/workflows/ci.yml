name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

  api-worker:
    name: API Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: api-worker/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Worker types
        run: yarn cf-typegen

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

  modal-converter:
    name: Modal Converter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modal-converter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: modal-converter/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Test
        run: uv run pytest
